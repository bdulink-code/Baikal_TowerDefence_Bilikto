<style>
@font-face {
  font-family:'RussoOne';

}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html,body { height:100%; background:#0e1626; overflow:hidden; font-family:'RussoOne','Segoe UI',system-ui,sans-serif; letter-spacing:.3px; touch-action:none; }
#wrap { position:fixed; inset:0; display:flex; align-items:flex-start; justify-content:center; }
canvas { display:block; }
#top {
  position:fixed; top:env(safe-area-inset-top,0); left:0; right:0; z-index:5;

#bar {

#ffBtn, #sndBtn { background:#22314f; color:#e8f0ff; font-size:17px; }

#overlay h1 { font-size:32px; font-weight:900; line-height:1.15; margin-bottom:10px; }

#overlay.defeat { filter:saturate(.68) brightness(.9); }
.btnPulse { animation:pulse 1.2s infinite; }

#ovRecord { margin-top:14px; font-size:14px; color:#ffd23c; letter-spacing:.5px; min-height:18px; }
#ovRecord.new { animation:hintBob 1.4s infinite; }
#ovBtns { display:flex; flex-direction:column; gap:10px; align-items:center; }
#overlay #contBtn { background:#4caf78; color:#04140b; font-size:16px; padding:13px 34px; box-shadow:0 6px 20px rgba(76,175,120,.4); }
#overlay #shareBtn { display:none; background:#22314f; color:#e8f0ff; font-size:15px; padding:12px 34px; box-shadow:none; }

#overlay #stormBtn { display:none; background:#7c4dff; color:#fff; font-size:15px; padding:12px 34px; box-shadow:0 6px 20px rgba(124,77,255,.4); }
#nerpaBtn { position:relative; border:2px solid #4a7fa8; background:#12283f; }
#milBtn { position:relative; border:2px solid #a8814a; background:#3f2f12; }
#milBtn .milI { font-size:clamp(14px,4.5vw,19px); line-height:1; }
#milBtn.rdy { animation:milRdy 1.6s infinite; }
@keyframes milRdy { 0%,100%{ box-shadow:0 0 0 rgba(255,200,90,0); } 50%{ box-shadow:0 0 16px rgba(255,200,90,.95); } }
#nerpaBtn .frz { position:absolute; top:-4px; right:-4px; font-size:15px; background:#7fd8ff; color:#052030; border-radius:50%; width:20px; height:20px; line-height:20px; text-align:center; border:2px solid #0e1626; pointer-events:none; }
#nerpaBtn .frzL, #milBtn .frzL { position:absolute; bottom:1px; left:0; right:0; font-size:clamp(6.5px,1.9vw,8.5px); font-weight:800; color:#aee6ff; letter-spacing:1px; pointer-events:none; text-shadow:0 1px 3px #000; }
#nerpaBtn.rdy { animation:nerpaRdy 1.6s infinite; }
@keyframes nerpaRdy { 0%,100%{ box-shadow:0 0 0 rgba(110,220,255,0); } 50%{ box-shadow:0 0 16px rgba(110,220,255,.95); } }
#nerpaBtn.cd img { filter:grayscale(1) brightness(.5); }

}
#dev { position:fixed; top:4px; left:4px; color:#0f0; font:12px monospace; display:none; z-index:20; }

<script type="module">
import { STR } from "./strings.js";

// ===== АНАЛИТИКА (Яндекс.Метрика) =====
const YM_ID = 110360565; // <- сюда номер счётчика Метрики
if(YM_ID){
  (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
  m[i].l=1*new Date();k=e.createElement(t),a=e.getElementsByTagName(t)[0],
  k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
  (window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");
  ym(YM_ID, "init", {clickmap:true, trackLinks:true, accurateTrackBounce:true, webvisor:true});
}
const GAME_VER='1.6.2';
let OWNER=false;
try{
  if(location.search.indexOf('owner')>-1){ localStorage.setItem('bk_owner','1'); }
  OWNER = localStorage.getItem('bk_owner')==='1';
}catch(e){}
function gameEvent(name,params){ if(OWNER) return; try{ if(YM_ID && window.ym){ params=params||{}; params.v=GAME_VER; ym(YM_ID,'reachGoal',name,params); } }catch(e){} }
let _errN=0;
window.addEventListener('error',e=>{ if(_errN++<3) gameEvent('js_error',{m:String(e.message||'').slice(0,90),l:e.lineno||0}); });
window.addEventListener('unhandledrejection',e=>{ if(_errN++<3) gameEvent('js_error',{m:('promise: '+String(e.reason||'')).slice(0,90)}); });
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
setTimeout(()=>gameEvent('session_3min'),180000);
setTimeout(()=>gameEvent('session_10min'),600000);
window.addEventListener('appinstalled',()=>gameEvent('pwa_install'));
document.addEventListener('pointerdown',()=>{ try{ if(ac && ac.state!=='running') ac.resume(); }catch(e){} }, true);


// ================= ЗВУК =================
let ac=null, muted=false, echoBus=null;
// мастер-шина: компрессор выравнивает пики — звук не шокирует, когда совпали 10 событий
let masterBus=null;
function master(){
  if(!masterBus && ac){
    const c=ac.createDynamicsCompressor();
    c.threshold.value=-14; c.knee.value=18; c.ratio.value=8; c.attack.value=0.004; c.release.value=0.18;
    const g=ac.createGain(); g.gain.value=0.9;
    c.connect(g); g.connect(ac.destination);
    masterBus=c;
  }
  return masterBus||ac.destination;
}
function A(){
  if(!ac){ const C=window.AudioContext||window.webkitAudioContext; ac=new C(); setTimeout(loadMusic,800); }
  if(ac.state!=='running'){ try{ ac.resume(); }catch(e){} }
  if(!echoBus){
    // эхо-шина: лёгкое пространство делает синтез "дорогим"
    echoBus=ac.createDelay(0.5); echoBus.delayTime.value=0.16;
    const fb=ac.createGain(); fb.gain.value=0.32;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2400;
    const wet=ac.createGain(); wet.gain.value=0.35;
    echoBus.connect(fb); fb.connect(lp); lp.connect(echoBus);
    echoBus.connect(wet); wet.connect(master());
  }
  if(!musStarted) startMusic();
  return ac;
}
function tone(f,dur,type='square',vol=0.12,slide=0,delay=0,send=0.12){
  if(muted) return;
  const a=A(), t0=a.currentTime+delay;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(Math.max(0.001,vol),t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(master());
  if(send>0 && echoBus){ const s=a.createGain(); s.gain.value=send; g.connect(s); s.connect(echoBus); }
  o.start(t0); o.stop(t0+dur+0.05);
}
function bell(f,dur=0.9,vol=0.09,delay=0){
  tone(f,dur,'sine',vol,0,delay,0.3);
  tone(f*2.76,dur*0.55,'sine',vol*0.28,0,delay,0.3);
}
function noiseS(dur,vol=0.2,fc=800,hp=0,delay=0){
  if(muted) return;
  const a=A(), t0=a.currentTime+delay;
  const len=Math.max(1,(a.sampleRate*dur)|0), buf=a.createBuffer(1,len,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=a.createBufferSource(); src.buffer=buf;
  const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(fc,t0);
  f.frequency.exponentialRampToValueAtTime(Math.max(80,fc*0.25),t0+dur);
  const g=a.createGain(); g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  let node=f;
  if(hp){ const hh=a.createBiquadFilter(); hh.type='highpass'; hh.frequency.value=hp; f.connect(hh); node=hh; }
  src.connect(f); node.connect(g); g.connect(master());
  if(echoBus){ const s=a.createGain(); s.gain.value=0.1; g.connect(s); s.connect(echoBus); }
  src.start(t0);
}
const SND={
  shoot(){ noiseS(0.06,0.10,3200,900); tone(520,0.05,'triangle',0.05,-260,0,0.05); },
  ice(){ bell(1568,0.5,0.07); tone(2093,0.3,'sine',0.03,-500,0.02); },
  boom(){ noiseS(0.4,0.30,1400); tone(95,0.35,'sine',0.26,-60); tone(60,0.5,'sine',0.14,-25,0.02); },
  coin(){ bell(1319,0.35,0.07); bell(1760,0.4,0.06,0.07); },
  place(){ tone(120,0.1,'sine',0.18,-50); noiseS(0.09,0.12,900,400,0.01); },
  up(){ [523,659,784].forEach((f,i)=>bell(f,0.4,0.08,i*0.08)); },
  sell(){ tone(440,0.12,'triangle',0.08,-180); noiseS(0.08,0.06,1500,600,0.02); },
  die(p){ p=p||1; noiseS(0.14,0.16,2200,300); tone(170*p,0.12,'square',0.06,-110); if(p>1) bell(660*p,0.22,0.05,0.02); },
  thud(){ tone(52,0.5,'sine',0.3,-8); tone(38,0.6,'sine',0.2,-5,0.04); noiseS(0.3,0.12,300,80); },
  horn(){ tone(147,0.55,'sawtooth',0.09,-30); tone(196,0.5,'sawtooth',0.07,-20,0.08); tone(294,0.4,'square',0.04,0,0.16); },
  leak(){ tone(140,0.4,'sawtooth',0.14,-50); tone(70,0.45,'sine',0.12,-20,0.03); },
  wave(){ [196,247,294].forEach(f=>tone(f,0.55,'sawtooth',0.05,30)); tone(392,0.5,'triangle',0.06,40,0.1); },
  win(){ [523,659,784,1047,1319].forEach((f,i)=>bell(f,0.7,0.09,i*0.13)); },
  lose(){ [392,330,262,196].forEach((f,i)=>tone(f,0.4,'sawtooth',0.08,-25,i*0.22,0.2)); },
  bad(){ tone(160,0.09,'sawtooth',0.07,-50); },
};

// ================= МУЗЫКА =================
// Пентатоника (ля-минорная) — основа бурятской музыкальной традиции.
const MUS_SCALE=[220,261.63,293.66,329.63,392,440,523.25];
const MUS_MEL=[0,null,2,3,null,4,null,2, 5,null,4,3,2,null,1,null,
               0,null,2,null,4,5,null,6, 5,null,4,null,2,3,null,null];
const MUS_BASS=[110,110,98,82.41];
let musStarted=false, musStep=0;
function startMusic(){
  if(musStarted) return; musStarted=true;
  setInterval(()=>{
    if(MUSF.loaded) return; // файловая музыка загружена — процедурная умолкает
    if(muted || document.hidden || !ac || ac.state!=='running') return;

const COLS = 8, ROWS = 12;
const PATH_CELLS = [];
(function(){
  const pts = [[-1,1],[5,1],[5,3],[1,3],[1,5],[6,5],[6,8],[1,8],[1,10],[8,10]];
  for(let i=0;i<pts.length-1;i++){
    let [c1,r1]=pts[i], [c2,r2]=pts[i+1];
    const dc=Math.sign(c2-c1), dr=Math.sign(r2-r1);
    let c=c1, r=r1;
    while(c!==c2 || r!==r2){ PATH_CELLS.push([c,r]); c+=dc; r+=dr; }
  }
  PATH_CELLS.push([8,10]);
})();
const pathSet = new Set(PATH_CELLS.filter(([c])=>c>=0&&c<COLS).map(([c,r])=>c+','+r));
function srand(a,b){ let h=(a*374761393+b*668265263)|0; h=(h^(h>>13))*1274126177; return ((h^(h>>16))>>>0)/4294967296; }

const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const DPR_CAP=1.5;
let W,H,CS,offX,offY, pathPts=[], pathLen=0, segLens=[];
function resize(){
  W=innerWidth; H=innerHeight;
  const dpr=Math.min(devicePixelRatio||1,DPR_CAP);
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const topEl=document.getElementById('top'), barEl=document.getElementById('bar');
  const topPad=(topEl&&topEl.offsetHeight>0?topEl.offsetHeight:Math.max(48,H*0.07))+6;
  const botPad=(barEl&&barEl.offsetHeight>0?barEl.offsetHeight:Math.max(120,H*0.20))+10;
  CS=Math.min(W/COLS,(H-topPad-botPad)/ROWS);
  offX=(W-CS*COLS)/2;
  const availH=H-topPad-botPad;
  offY=topPad+Math.max(0,(availH-CS*ROWS)/2);
  const oldLen=pathLen||0;
  pathPts=PATH_CELLS.map(([c,r])=>[offX+(c+0.5)*CS, offY+(r+0.5)*CS]);
  segLens=[]; pathLen=0;
  for(let i=0;i<pathPts.length-1;i++){
    const l=Math.hypot(pathPts[i+1][0]-pathPts[i][0], pathPts[i+1][1]-pathPts[i][1]);
    segLens.push(l); pathLen+=l;
  }
  // при смене ориентации путь меняет длину — переносим прогресс врагов пропорционально
  try{
    if(oldLen>0 && pathLen>0 && Math.abs(oldLen-pathLen)>0.5){
      const k=pathLen/oldLen;
      enemies.forEach(e=>{ e.d*=k; });
      projs.length=0; parts.length=0;
    }
  }catch(e){}
}
addEventListener('resize',resize); addEventListener('orientationchange',()=>{ resize(); setTimeout(resize,120); setTimeout(resize,400); }); resize();

function posAt(d){
  let acc=0;
  for(let i=0;i<segLens.length;i++){
    if(acc+segLens[i]>=d){
      const t=(d-acc)/segLens[i];
      const dx=pathPts[i+1][0]-pathPts[i][0], dy=pathPts[i+1][1]-pathPts[i][1];
      return [pathPts[i][0]+dx*t, pathPts[i][1]+dy*t, Math.atan2(dy,dx)];
    }
    acc+=segLens[i];
  }
  const n=pathPts.length;
  return [pathPts[n-1][0], pathPts[n-1][1], 0];
}

function buildWave(n){
  const q=[];
  const add=(type,cnt,gap)=>{ for(let i=0;i<cnt;i++) q.push({type,gap}); };
  const m=(1.32*Math.pow(1.2,n-1))*(stormMode?1.5:1);
  const spM=Math.min(1+0.02*(n-1),1.35);
  if(n===MAXWAVE){ add('warrior',6,0.6); add('armored',6,1.0); add('runner',6,0.3); q.push({type:'boss',gap:2.6,mega:true}); add('scout',12,0.33); }
  else if(n%5===0){ add('armored',4,1.1); add('boss',1,2); add('runner',4,0.35); add('scout',8,0.4); }
  else {
    add('scout',5+n,0.62);
    if(n>=2) add('warrior',2+n,0.85);
    if(n>=4) add('armored',Math.floor(n/2),1.2);
    if(n>=6) add('runner',Math.max(3,n-3),0.42);
    if(n>=8) add('tank',Math.floor((n-6)/2),1.7);
  }
  q.forEach(s=>{ s.hpMul=m; s.spMul=spM; });
  return q;
}

function coinTarget(){ const cr=cv.getBoundingClientRect(), mr=moneyEl.getBoundingClientRect(); return [mr.left+mr.width/2-cr.left, mr.top+mr.height/2-cr.top]; }

function updFxs(dt){
  for(let i=fxs.length-1;i>=0;i--){
    const f=fxs[i]; f.t+=dt;
    if(f.type==='conf'&&f.t>0){ f.x+=f.vx*dt; f.y+=f.vy*dt; f.vy+=250*dt; f.rot+=f.vr*dt; }
    if(f.t>=f.max) fxs.splice(i,1);
  }
}
function drawFxs(t){
  fxs.forEach(f=>{
    if(f.t<0) return;
    const p=f.t/f.max;
    if(f.type==='ribbon'){
      const a=Math.min(1,p*5)*(p>0.75?(1-p)*4:1);
      const y=offY+CS*4.6, slide=(1-Math.pow(1-Math.min(1,p*3),3))*0;
      ctx.save(); ctx.globalAlpha=a*0.85;
      ctx.fillStyle='#101a30';
      ctx.fillRect(offX-CS,y-CS*0.42,CS*(COLS+2),CS*0.84);
      ctx.globalAlpha=a;
      ctx.strokeStyle='#ffd23c'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(offX-CS,y-CS*0.42); ctx.lineTo(offX+CS*(COLS+1),y-CS*0.42); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(offX-CS,y+CS*0.42); ctx.lineTo(offX+CS*(COLS+1),y+CS*0.42); ctx.stroke();
      ctx.fillStyle='#ffd23c'; ctx.textAlign='center'; ctx.font='bold '+Math.round(CS*0.34)+'px RussoOne,sans-serif';
      ctx.fillText(f.txt, offX+CS*COLS/2+slide, y+CS*0.12);
      ctx.restore();
    } else if(f.type==='coin'){
      const e=Math.pow(p,1.6);
      const x=f.x+(f.tx-f.x)*e, y=f.y+(f.ty-f.y)*e;
      ctx.save(); ctx.globalAlpha=1-Math.pow(p,6);
      ctx.fillStyle='#ffd23c'; ctx.strokeStyle=OUT; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(x,y,4.5*(1-p*0.4),0,7); ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if(f.type==='omen'){
      const a=Math.sin(Math.PI*p)*0.4;
      ctx.save(); ctx.globalAlpha=a;
      ctx.fillStyle='#04060e'; ctx.fillRect(offX,offY,CS*COLS,CS*ROWS);
      const [sx,sy]=pathPts.length?pathPts[0]:[offX,offY+CS];
      ctx.globalAlpha=Math.min(1,a*3);
      ctx.fillStyle='#ff5a5a'; ctx.textAlign='center';
      ctx.font='bold '+Math.round(CS*0.6)+'px RussoOne,sans-serif';
      ctx.fillText('!!!', sx+CS*0.8, sy-CS*0.35+Math.sin(t*9)*3);
      ctx.restore();
    } else if(f.type==='plate'){
      const inK=Math.min(1,p*4), sc=1+(1-inK)*0.6, a=(p>0.8?(1-p)*5:1);
      const x=offX+CS*COLS/2, y=offY+CS*3.4;
      ctx.save(); ctx.globalAlpha=a; ctx.translate(x,y); ctx.scale(sc,sc);
      const w=CS*5.6, h=CS*1.05;
      ctx.fillStyle=f.gold?'#3a2c08':'#141d33';
      ctx.strokeStyle=f.gold?'#ffd23c':'#93a2c0'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,10); ctx.fill(); ctx.stroke();
      ctx.fillStyle=f.gold?'#ffd23c':'#e8f0ff'; ctx.textAlign='center';
      ctx.font='bold '+Math.round(CS*0.42)+'px RussoOne,sans-serif';
      ctx.fillText(f.txt,0,CS*0.15);
      ctx.restore();
    } else if(f.type==='conf'){
      ctx.save(); ctx.globalAlpha=p>0.8?(1-p)*5:1;
      ctx.translate(f.x,f.y); ctx.rotate(f.rot);
      ctx.fillStyle=f.col; ctx.fillRect(-3.5,-2,7,4);
      ctx.restore();
    }
  });
}
function puff(x,y,col,n,spd){
  for(let k=0;k<n;k++){
    const a=Math.random()*7, v=spd*(0.4+Math.random()*0.6);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,t:0.38,max:0.38,col,r:2.5+Math.random()*2});
  }
}
function dmgNum(x,y,val,col){
  dmgTxt.push({x:x+(Math.random()-.5)*10,y:y-CS*0.3,t:0.7,max:0.7,str:(typeof val==='string')?val:Math.round(val),col});
}

// ================= ЛОГИКА =================
function update(dtMs){
  updFxs(dtMs/1000);
  if(state!=='play') return;
  const dt=(dtMs/1000)*gs;
  gt+=dt;

  if(spawnQ.length){
    spawnT-=dt;
    if(spawnT<=0){
      const s=spawnQ.shift();
      const b=ENEMIES[s.type];
      const hp=b.hp*s.hpMul*(s.mega?1.65:1);
      enemies.push({type:s.type,d:0,hp:hp,maxhp:hp,sp:b.sp*(s.spMul||1)*(stormMode?1.15:1),slow:0,frz:0,mega:!!s.mega,ph:Math.random()*7,flash:0});
      if(s.type==='boss'){ SND.thud(); shakeA=s.mega?6:3; fxBossPlate(s.mega); }
      spawnT=s.gap;
    }
  } else if(waveActive && enemies.length===0){
    waveActive=false;
    const bonus=Math.round((40+wave*8)*(stormMode?0.75:1));
    money+=bonus; stats.gold+=bonus; SND.coin();
    if(wave>=MAXWAVE){ endGame(true); return; }
    saveGame();
    fxWaveClear(wave,bonus);
    if(wave===2 && towers.some(tw=>tw.lvl<3) && localStorage_ok() && !localStorage.getItem('bk_gift')){
      money+=40; SND.coin();
      giftArrow=true;
      setTimeout(()=>{ if(state==='play') showToast(STR.giftT); },1200);
      try{ localStorage.setItem('bk_gift','1'); }catch(e){}
    }
    if(wave>=3 && wave%3===0){
      const tip=STR.tips[(wave/3-1)%STR.tips.length];
      setTimeout(()=>{ if(state==='play'&&!waveActive) showToast(tip); },1800);
    }
    if(wave===1){ setTimeout(()=>{ if(state==='play') showToast(STR.tutUp); },1400); }
    updHud();
  }

  // рать: движение навстречу и ближний бой
  enemies.forEach(e=>e.blk=false);
  const EDPS={scout:22,runner:22,warrior:30,armored:35,tank:55,boss:90};
  for(let mi=militia.length-1;mi>=0;mi--){
    const m=militia[mi]; m.swing+=dt*8;
    m.tgt=null;
    for(const e of enemies){ if(e.hp>0 && Math.abs(e.d-m.d)<CS*0.4){ m.tgt=e; break; } }
    if(m.tgt){
      m.tgt.blk=true;
      m.tgt.hp-=m.dps*dt; m.tgt.flash=Math.max(m.tgt.flash,0.06);
      m.hp-=(EDPS[m.tgt.type]||25)*(m.tgt.mega?2:1)*dt;
    } else if(m.d>CS*0.5){ m.d-=m.sp*(CS/44)*dt; }
    if(m.hp<=0){
      const [px,py]=posAt(m.d);
      puff(px,py,'#e8b45a',6,150);
      militia.splice(mi,1);
    }
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.slow>0) e.slow-=dt;
    if(e.flash>0) e.flash-=dt;
    if(e.frz>0){ e.frz-=dt; } else if(!e.blk) e.d+=e.sp*(e.slow>0?0.45:1)*(CS/44)*dt;
    if(e.d>=pathLen){
      enemies.splice(i,1);
      SND.leak();
      shakeA=Math.max(shakeA,e.type==='boss'?6:2.5);
      lives-=(e.type==='boss'?(e.mega?10:5):(e.type==='tank'?2:1));
      if(lives<=0){ lives=0; updHud(); endGame(false); return; }
      updHud();
    }
  }

  if(nerpaCd>0){
    nerpaCd=Math.max(0,nerpaCd-dt);
    const sec=Math.ceil(nerpaCd);
    if(sec!==nerpaCdShown){ nerpaCdShown=sec; $('nerpaCdT').textContent=sec||''; $('nerpaBtn').classList.toggle('cd',sec>0); if(sec===0&&state==='play') $('nerpaBtn').classList.add('rdy'); }
  }
  if(milCd>0){
    milCd=Math.max(0,milCd-dt);
    const ms=Math.ceil(milCd);
    if(ms!==milCdShown){ milCdShown=ms; $('milCdT').textContent=ms||''; $('milBtn').classList.toggle('cd',ms>0); if(ms===0&&state==='play') $('milBtn').classList.add('rdy'); }
  }
  towers.forEach(tw=>{
    tw.cd-=dt;
    if(tw.anim>0) tw.anim-=dt;
    if(tw.born>0) tw.born-=dt;
    if(tw.cd>0) return;
    const b=TOWERS[tw.type];
    const rng=(b.rng+0.18*(tw.lvl-1))*CS;
    const tx=offX+(tw.c+0.5)*CS, ty=offY+(tw.r+0.5)*CS;
    let best=null, bd=-1;
    for(const e of enemies){
      const [ex,ey]=posAt(e.d);
      if(Math.hypot(ex-tx,ey-ty)<=rng && e.d>bd){ best=e; bd=e.d; }
    }
    if(best){
      const [ex,ey]=posAt(best.d);
      tw.ang=Math.atan2(ey-ty,ex-tx);
      const dmg=b.dmg*Math.pow(1.65,tw.lvl-1);
      projs.push({type:tw.type,x:tx,y:ty-CS*0.2,tgt:best,dmg,slow:!!b.slow,splash:!!b.splash,sp:CS*(tw.type==='fire'?7:12)});
      tw.cd=b.cd*Math.pow(0.92,tw.lvl-1);
      tw.anim=0.28;
      tw.type==='archer'?SND.shoot():tw.type==='frost'?SND.ice():null;
    }
  });

  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];
    if(!enemies.includes(p.tgt)){ projs.splice(i,1); continue; }
    const [ex,ey]=posAt(p.tgt.d);
    const dx=ex-p.x, dy=ey-p.y, dl=Math.hypot(dx,dy);
    if(dl<CS*0.24){
      hit(p,ex,ey);
      projs.splice(i,1);
    } else {
      p.vx=dx/dl; p.vy=dy/dl;
      p.x+=p.vx*p.sp*dt; p.y+=p.vy*p.sp*dt;
      if(p.type==='frost' && Math.random()<0.5)
        parts.push({x:p.x,y:p.y,vx:(Math.random()-.5)*30,vy:(Math.random()-.5)*30,t:0.3,max:0.3,col:'#7fd8ff',r:2});
      if(p.type==='fire' && Math.random()<0.7)
        parts.push({x:p.x,y:p.y,vx:(Math.random()-.5)*40,vy:-20-Math.random()*30,t:0.35,max:0.35,col:Math.random()<.5?'#ff7a3c':'#ffd23c',r:2.5});
    }
  }

  for(let i=parts.length-1;i>=0;i--){
    const q=parts[i]; q.t-=dt;
    if(q.t<=0){ parts.splice(i,1); continue; }
    q.x+=q.vx*dt; q.y+=q.vy*dt;
  }
  for(let i=dmgTxt.length-1;i>=0;i--){
    const q=dmgTxt[i]; q.t-=dt; q.y-=30*dt;
    if(q.t<=0) dmgTxt.splice(i,1);
  }
  for(let i=corpses.length-1;i>=0;i--){
    corpses[i].t-=dt;
    if(corpses[i].t<=0) corpses.splice(i,1);
  }
  if(badCell){ badCell.t-=dt; if(badCell.t<=0) badCell=null; }
}

function hit(p, ex, ey){
  const victims = p.splash
    ? enemies.filter(e=>{ const [x,y]=posAt(e.d); return Math.hypot(x-ex,y-ey)<CS*0.95; })
    : [p.tgt];
  if(p.splash){
    SND.boom();
    ring(ex,ey,'#ff7a3c',CS*0.95);
    puff(ex,ey,'#ff7a3c',8,200); puff(ex,ey,'#ffd23c',6,160);
  }
  victims.forEach(e=>{
    e.hp-=p.dmg; e.flash=0.12;
    if(e.type!=='boss'&&e.type!=='tank'&&e.type!=='armored') e.d=Math.max(0,e.d-CS*0.045);
    dmgNum(ex,ey,p.dmg, p.type==='fire'?'#ff9a5c':p.type==='frost'?'#a8e4ff':'#ffe08a');
    if(p.slow){ e.slow=1.6; ring(ex,ey,'#7fd8ff',CS*0.4); }
    if(e.hp<=0 && enemies.includes(e)){
      window._fk||(window._fk=1,gameEvent('first_kill'));
      const [x,y,a]=posAt(e.d);
      corpses.push({x,y,a,type:e.type,t:0.5,max:0.5});
      puff(x,y,ENEMIES[e.type].col,6,170);
      puff(x,y,'#c8d2e0',5,140); // болтики
      const now=performance.now()/1000;
      killStreak=(now-lastKillT<1.5)?killStreak+1:0; lastKillT=now;
      SND.die(Math.pow(2,Math.min(killStreak,8)/12));
      stats.kills++;
      const rw=Math.max(1,Math.round(ENEMIES[e.type].rw*Math.pow(0.96,wave-1)*(stormMode?0.75:1)))*(e.mega?3:1);
      dmgNum(x,y-CS*0.2,'+'+rw+'🐟','#ffd23c');
      if(e.type==='boss'){ SND.thud(); shakeA=e.mega?7:4; }
      stats.gold+=rw;
      money+=rw;
      enemies.splice(enemies.indexOf(e),1);
      updHud();
    }
  });
}

// ================= РОБОТЫ =================
function drawBot(x,y,ang,ph,b,scale,slowed,type,flash){
  const spr=EIMG[type];
  if(spr && spr.complete && spr.naturalWidth){
    const sz=CS*1.5*scale;
    const stp=Math.sin(ph*9);
    const bob=Math.abs(stp)*sz*0.055;
    const tilt=stp*0.055;
    const flp=Math.cos(ang)<-0.05?-1:1;
    // тень на земле — не прыгает вместе с роботом
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(x,y+sz*0.34,sz*0.28,sz*0.085,0,0,7); ctx.fill();
    ctx.save(); ctx.translate(x,y-bob); ctx.scale(flp,1); ctx.rotate(tilt);
    ctx.globalAlpha=slowed?0.85:1;
    ctx.drawImage(spr,-sz/2,-sz*0.62,sz,sz);
    if(flash>0 && EIMGW[type]){ ctx.globalAlpha=Math.min(1,flash*8); ctx.drawImage(EIMGW[type],-sz/2,-sz*0.62,sz,sz); }
    if(slowed){ ctx.globalAlpha=0.5; ctx.fillStyle='#7fd8ff'; ctx.beginPath(); ctx.arc(0,0,sz*0.4,0,7); ctx.fill(); }
    ctx.restore();
    return;
  }
  const s=CS*scale;
  const step=Math.sin(ph*11);
  const bounce=Math.abs(Math.sin(ph*11))*s*0.07;
  const flip = Math.cos(ang)<-0.05 ? -1 : 1;
  const bodyCol = slowed ? '#8fd4f5' : b.col;
  const darkCol = slowed ? '#5a9cc4' : b.dark;

  // тень
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(x,y+s*0.6,s*0.42,s*0.13,0,0,7); ctx.fill();

  ctx.save(); ctx.translate(x,y-bounce); ctx.scale(flip,1);
  ctx.lineJoin='round'; ctx.lineCap='round';
  const lw=Math.max(2,s*0.08);

  if(type==='armored'||type==='tank'){
    // танк на гусеницах
    ctx.fillStyle=darkCol;
    ctx.beginPath(); ctx.roundRect(-s*0.42,s*0.22,s*0.84,s*0.3,s*0.15); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
    // катки крутятся
    ctx.fillStyle=OUT;
    for(let i=-1;i<=1;i++){
      ctx.save(); ctx.translate(i*s*0.24,s*0.37); ctx.rotate(ph*8);
      ctx.beginPath(); ctx.arc(0,0,s*0.08,0,7); ctx.fill();
      ctx.strokeStyle=bodyCol; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-s*0.06,0); ctx.lineTo(s*0.06,0); ctx.stroke();
      ctx.restore();
    }
  } else {
    // ножки-поршни
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*1.7;
    ctx.beginPath(); ctx.moveTo(-s*0.16,s*0.24); ctx.lineTo(-s*0.16+step*s*0.18, s*0.56); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.16,s*0.24); ctx.lineTo(s*0.16-step*s*0.18, s*0.56); ctx.stroke();
    ctx.strokeStyle=darkCol; ctx.lineWidth=lw*0.9;
    ctx.beginPath(); ctx.moveTo(-s*0.16,s*0.24); ctx.lineTo(-s*0.16+step*s*0.18, s*0.53); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.16,s*0.24); ctx.lineTo(s*0.16-step*s*0.18, s*0.53); ctx.stroke();
    // ступни
    ctx.fillStyle=OUT;
    ctx.beginPath(); ctx.ellipse(-s*0.16+step*s*0.18, s*0.56, s*0.09,s*0.05,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s*0.16-step*s*0.18, s*0.56, s*0.09,s*0.05,0,0,7); ctx.fill();
  }

  // корпус — скруглённая коробка с панелькой
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.roundRect(-s*0.34,-s*0.24,s*0.68,s*0.52,s*0.14); ctx.fill();
  ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
  ctx.fillStyle=darkCol;
  ctx.beginPath(); ctx.roundRect(-s*0.24,-s*0.02,s*0.48,s*0.18,s*0.07); ctx.fill();
  // заклёпки
  ctx.fillStyle=OUT;
  ctx.beginPath(); ctx.arc(-s*0.26,-s*0.16,s*0.025,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.26,-s*0.16,s*0.025,0,7); ctx.fill();

  // рука-манипулятор с клешнёй (машет)
  const arm=step*0.4;
  ctx.save(); ctx.translate(s*0.32,-s*0.05); ctx.rotate(-0.3+arm*0.5);
  ctx.strokeStyle=OUT; ctx.lineWidth=lw*1.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(s*0.3,s*0.06); ctx.stroke();
  ctx.strokeStyle=darkCol; ctx.lineWidth=lw*0.8;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(s*0.28,s*0.055); ctx.stroke();
  // клешня
  ctx.strokeStyle=OUT; ctx.lineWidth=lw*1.1;
  ctx.beginPath(); ctx.arc(s*0.36,s*0.06,s*0.1,-0.7,0.7); ctx.stroke();
  ctx.beginPath(); ctx.arc(s*0.36,s*0.06,s*0.1,Math.PI-0.7,Math.PI+0.7); ctx.stroke();
  ctx.restore();

  // щит-плита у танка
  if(type==='armored'||type==='tank'){
    ctx.fillStyle='#7d8db0';
    ctx.beginPath(); ctx.roundRect(-s*0.5,-s*0.22,s*0.14,s*0.46,s*0.05); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
  }

  // голова — купол с глазом-визором
  const hy=-s*0.4;
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.roundRect(-s*0.26,hy-s*0.2,s*0.52,s*0.34,s*0.12); ctx.fill();
  ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
  // визор
  ctx.fillStyle=OUT;
  ctx.beginPath(); ctx.roundRect(-s*0.18,hy-s*0.12,s*0.36,s*0.16,s*0.07); ctx.fill();
  // глаза светятся (у босса два, у остальных один широкий)
  const glow=0.7+0.3*Math.sin(ph*6);
  ctx.fillStyle=b.eye;
  if(type==='boss'){
    ctx.globalAlpha=glow;
    ctx.beginPath(); ctx.arc(-s*0.08,hy-s*0.04,s*0.05,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.08,hy-s*0.04,s*0.05,0,7); ctx.fill();
    ctx.globalAlpha=1;
  } else {
    ctx.globalAlpha=glow;
    ctx.beginPath(); ctx.roundRect(-s*0.12,hy-s*0.08,s*0.24,s*0.07,s*0.03); ctx.fill();
    ctx.globalAlpha=1;
  }
  // антенна с огоньком
  ctx.strokeStyle=OUT; ctx.lineWidth=lw*0.8;
  ctx.beginPath(); ctx.moveTo(0,hy-s*0.2); ctx.lineTo(0,hy-s*0.34); ctx.stroke();
  ctx.fillStyle=b.eye; ctx.globalAlpha=glow;
  ctx.beginPath(); ctx.arc(0,hy-s*0.37,s*0.045,0,7); ctx.fill();
  ctx.globalAlpha=1;
  // рожки-трубы у босса
  if(type==='boss'){
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*1.6;
    ctx.beginPath(); ctx.moveTo(-s*0.24,hy-s*0.18); ctx.lineTo(-s*0.36,hy-s*0.42); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.24,hy-s*0.18); ctx.lineTo(s*0.36,hy-s*0.42); ctx.stroke();
    ctx.strokeStyle='#e8d8a0'; ctx.lineWidth=lw*0.8;
    ctx.beginPath(); ctx.moveTo(-s*0.24,hy-s*0.18); ctx.lineTo(-s*0.35,hy-s*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.24,hy-s*0.18); ctx.lineTo(s*0.35,hy-s*0.4); ctx.stroke();
  }

  // вспышка урона
  if(flash>0){
    ctx.globalAlpha=Math.min(1,flash*8)*0.75;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.roundRect(-s*0.4,hy-s*0.24,s*0.8,s*1.05,s*0.16); ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawTowerFig(tw,t){
  const x=offX+(tw.c+0.5)*CS, y=offY+(tw.r+0.5)*CS;
  drawTowerAt(x,y,tw.type,tw.lvl,t,tw.anim>0?tw.anim/0.28:0,tw.born>0?tw.born:0,tw.ang,1);
  ctx.fillStyle='#ffd23c'; ctx.strokeStyle=OUT; ctx.lineWidth=1;
  for(let l=0;l<tw.lvl;l++){
    ctx.beginPath(); ctx.arc(x-CS*0.18+l*CS*0.18, y+CS*0.42, 3,0,7); ctx.fill(); ctx.stroke();
  }
}
// спрайты башен: 3 типа × 3 уровня (фолбэк — векторная отрисовка ниже)
const TIMG={};
const EIMG={}, EIMGW={};
['scout','warrior','armored','runner','tank','boss'].forEach(tp=>{
  const im=new Image(); im.src='./assets/e_'+tp+'.png';
  im.onload=()=>{ const c=document.createElement('canvas'); c.width=im.width; c.height=im.height;
    const cx=c.getContext('2d'); cx.drawImage(im,0,0); cx.globalCompositeOperation='source-in';
    cx.fillStyle='#fff'; cx.fillRect(0,0,c.width,c.height); EIMGW[tp]=c; };
  EIMG[tp]=im;
});
const MILIMG=new Image(); MILIMG.src='./assets/militia.png';
// Звери Байкала (подмога): 0=медведь-танк, 1=соболь-разведчик, 2=волк-боец
const BEASTIMG=['bear','sable','wolf'].map(n=>{ const im=new Image(); im.src='./assets/beast_'+n+'.png'; return im; });
['archer','frost','fire'].forEach(tp=>{
  TIMG[tp]=[1,2,3].map(l=>{ const im=new Image(); im.src='./assets/'+tp+(l===1?'':l)+'.png'; return im; });
});
function drawTowerAt(x,y,type,lvl,t,k,born,ang,alpha){
  const s=CS*0.95;
  const pop = born>0 ? 1+Math.sin(born/0.35*Math.PI)*0.25 : 1;
  const breathe=Math.sin(t*2+x*0.03+y*0.02)*0.02;
  const spr=TIMG[type]&&TIMG[type][Math.min(lvl,3)-1];
  if(spr && spr.complete && spr.naturalWidth){
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(x,y+s*0.3,s*0.44,s*0.16,0,0,7); ctx.fill();
    const sc=(pop+breathe)*(1+k*0.07);
    const sz=CS*1.22*sc;
    ctx.drawImage(spr, x-sz/2, y+s*0.34-sz, sz, sz);
    ctx.restore();
    return;
  }
  const lw=Math.max(2,s*0.06);
  ctx.save(); ctx.globalAlpha=alpha;
  // тень + каменный помост
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(x,y+s*0.3,s*0.44,s*0.16,0,0,7); ctx.fill();
  ctx.fillStyle='#3a4d6b';
  ctx.beginPath(); ctx.ellipse(x,y+s*0.26,s*0.42,s*0.16,0,0,7); ctx.fill();
  ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
  ctx.fillStyle='#2c3c56';
  ctx.beginPath(); ctx.ellipse(x,y+s*0.23,s*0.34,s*0.11,0,0,7); ctx.fill();

  // спрайт нано-банана, если загружен
  const im=IMG[type];
  if(im && im.complete && im.naturalWidth){
    const sz=CS*1.28*pop*(1+k*0.1);
    ctx.drawImage(im, x-sz/2, y-sz*0.68, sz, sz);
    if(type==='frost'){
      ctx.strokeStyle='rgba(168,228,255,'+(0.35+k*0.45)+')'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(x,y-s*0.15,s*(0.4+0.05*Math.sin(t*4)+k*0.22),0,7); ctx.stroke();
      for(let i=0;i<3;i++){
        const a2=t*2+i*2.1;
        ctx.fillStyle='rgba(168,228,255,'+(0.5+k*0.4)+')';
        ctx.beginPath(); ctx.arc(x+Math.cos(a2)*s*0.42, y-s*0.18+Math.sin(a2)*s*0.24, s*0.035,0,7); ctx.fill();
      }
    }
    if(type==='fire' && k>0.15){
      ctx.fillStyle='rgba(255,210,60,'+k*0.8+')';
      ctx.beginPath(); ctx.arc(x+Math.sin(t*17)*s*0.1, y-s*0.55-k*s*0.15, s*0.045,0,7); ctx.fill();
    }
    if(type==='archer' && k>0.4){
      ctx.strokeStyle='rgba(255,240,180,'+(k-0.4)+')'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x,y-s*0.3,s*0.42,ang-0.4,ang+0.4); ctx.stroke();
    }
    ctx.restore();
    return;
  }

  ctx.translate(x,y-s*0.05); ctx.scale(pop*(1+breathe),pop*(1-breathe));
  ctx.lineJoin='round'; ctx.lineCap='round';

  if(type==='archer'){
    // деревянная вышка
    ctx.fillStyle='#6e5540';
    ctx.beginPath(); ctx.roundRect(-s*0.2,-s*0.12,s*0.4,s*0.34,s*0.05); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
    ctx.strokeStyle='#54402f'; ctx.lineWidth=lw*0.5;
    ctx.beginPath(); ctx.moveTo(-s*0.2,0); ctx.lineTo(s*0.2,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s*0.2,s*0.11); ctx.lineTo(s*0.2,s*0.11); ctx.stroke();
    // лучник в меховой шапке
    ctx.fillStyle='#4d8563';
    ctx.beginPath(); ctx.ellipse(0,-s*0.24,s*0.17,s*0.18,0,0,7); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*0.9; ctx.stroke();
    ctx.fillStyle='#eec89c'; ctx.beginPath(); ctx.arc(0,-s*0.46,s*0.14,0,7); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*0.9; ctx.stroke();
    ctx.fillStyle='#141b2c';
    ctx.beginPath(); ctx.arc(-s*0.045,-s*0.47,s*0.02,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.05,-s*0.47,s*0.02,0,7); ctx.fill();
    // меховая шапка с оторочкой
    ctx.fillStyle='#8a6a44';
    ctx.beginPath(); ctx.arc(0,-s*0.52,s*0.145,Math.PI,0); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*0.8; ctx.stroke();
    ctx.fillStyle='#d8c8b0';
    ctx.beginPath(); ctx.roundRect(-s*0.15,-s*0.55,s*0.3,s*0.05,s*0.02); ctx.fill();
    // лук со стрелой к цели
    ctx.save(); ctx.translate(0,-s*0.34); ctx.rotate(ang);
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*1.6;
    ctx.beginPath(); ctx.arc(s*0.2,0,s*0.24,-1.1,1.1); ctx.stroke();
    ctx.strokeStyle='#b5854f'; ctx.lineWidth=lw*0.9;
    ctx.beginPath(); ctx.arc(s*0.2,0,s*0.24,-1.1,1.1); ctx.stroke();
    const pull=k*s*0.2;
    ctx.strokeStyle='#e8f0ff'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(s*0.2+Math.cos(-1.1)*s*0.24, Math.sin(-1.1)*s*0.24);
    ctx.lineTo(s*0.2-pull,0);
    ctx.lineTo(s*0.2+Math.cos(1.1)*s*0.24, Math.sin(1.1)*s*0.24);
    ctx.stroke();
    if(k>0.1){
      ctx.strokeStyle='#c8a060'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(s*0.2-pull,0); ctx.lineTo(s*0.42,0); ctx.stroke();
    }
    ctx.restore();
  } else if(type==='frost'){
    // ледяной кристалл-обелиск: снежный холм + три шарда с внутренним свечением
    const bob=Math.sin(t*2.5)*s*0.015;
    ctx.fillStyle='#dfe8f5';
    ctx.beginPath(); ctx.ellipse(0,s*0.18,s*0.3,s*0.12,0,0,7); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*0.8; ctx.stroke();
    // задние шарды
    const shard=(dx,topY,w2,tint)=>{
      ctx.fillStyle=tint;
      ctx.beginPath();
      ctx.moveTo(dx, topY+bob);
      ctx.lineTo(dx+w2, s*0.16);
      ctx.lineTo(dx-w2, s*0.16);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle=OUT; ctx.lineWidth=lw*0.9; ctx.stroke();
      // блик
      ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=lw*0.4;
      ctx.beginPath(); ctx.moveTo(dx-w2*0.3, topY+bob+s*0.12); ctx.lineTo(dx-w2*0.45, s*0.1); ctx.stroke();
    };
    shard(-s*0.18,-s*0.28,s*0.11,'#6fa8dc');
    shard(s*0.18,-s*0.34,s*0.11,'#6fa8dc');
    shard(0,-s*0.58,s*0.15,'#a8d8f5');
    // внутреннее свечение — пульсирует, при касте вспыхивает
    const gl=0.35+0.2*Math.sin(t*3)+k*0.5;
    ctx.globalAlpha=gl;
    ctx.fillStyle='#d8f2ff';
    ctx.beginPath(); ctx.moveTo(0,-s*0.5+bob); ctx.lineTo(s*0.08,s*0.05); ctx.lineTo(-s*0.08,s*0.05); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=alpha;
    // морозная дымка у основания
    ctx.strokeStyle='rgba(168,228,255,'+(0.3+k*0.4)+')'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,s*0.12,s*(0.32+0.04*Math.sin(t*4)+k*0.2),0,7); ctx.stroke();
    // кружащие льдинки
    for(let i=0;i<4;i++){
      const a2=t*2+i*1.6;
      ctx.fillStyle='rgba(168,228,255,'+(0.5+k*0.4)+')';
      ctx.beginPath(); ctx.arc(Math.cos(a2)*s*0.36, -s*0.15+Math.sin(a2)*s*0.22, s*0.032,0,7); ctx.fill();
    }
  } else {
    // огненный котёл: каменная башенка с чашей огня
    ctx.fillStyle='#5c6b85';
    ctx.beginPath(); ctx.moveTo(-s*0.2,s*0.22); ctx.lineTo(-s*0.15,-s*0.14); ctx.lineTo(s*0.15,-s*0.14); ctx.lineTo(s*0.2,s*0.22); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
    // кладка
    ctx.strokeStyle='#465370'; ctx.lineWidth=lw*0.5;
    ctx.beginPath(); ctx.moveTo(-s*0.17,s*0.04); ctx.lineTo(s*0.17,s*0.04); ctx.stroke();
    // чаша
    ctx.fillStyle='#3a4152';
    ctx.beginPath(); ctx.ellipse(0,-s*0.18,s*0.24,s*0.1,0,0,Math.PI,true); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-s*0.18,s*0.24,s*0.07,0,0,7); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw; ctx.stroke();
    // пламя живое
    const fl=0.7+0.3*Math.sin(t*9+x*0.05)+k*0.9;
    const fh=s*0.34*fl;
    const grad=ctx.createLinearGradient(0,-s*0.2-fh,0,-s*0.16);
    grad.addColorStop(0,'#ffd23c'); grad.addColorStop(1,'#ff7a3c');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(-s*0.15,-s*0.19);
    ctx.quadraticCurveTo(-s*0.2,-s*0.2-fh*0.55, -s*0.03,-s*0.2-fh*0.8);
    ctx.quadraticCurveTo(0,-s*0.2-fh, s*0.06,-s*0.2-fh*0.7);
    ctx.quadraticCurveTo(s*0.2,-s*0.2-fh*0.5, s*0.15,-s*0.19);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=OUT; ctx.lineWidth=lw*0.7; ctx.stroke();
    // угольки
    if(Math.sin(t*7+x)>0.6){
      ctx.fillStyle='#ffd23c';
      ctx.beginPath(); ctx.arc(Math.sin(t*5)*s*0.1,-s*0.3-fh*0.5,s*0.03,0,7); ctx.fill();
    }
  }
  ctx.restore();
}

function drawTree(x,y,seed){
  const s=CS*(0.5+seed*0.35);
  ctx.fillStyle='#16301f';
  ctx.beginPath(); ctx.moveTo(x,y-s*0.7); ctx.lineTo(x+s*0.3,y+s*0.1); ctx.lineTo(x-s*0.3,y+s*0.1); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x,y-s*0.45); ctx.lineTo(x+s*0.36,y+s*0.3); ctx.lineTo(x-s*0.36,y+s*0.3); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(223,232,245,.7)';
  ctx.beginPath(); ctx.ellipse(x,y-s*0.4,s*0.14,s*0.05,0,0,7); ctx.fill();
}

// ================= РЕНДЕР =================
let snowAmb=[];
function initSnow(){ snowAmb=Array.from({length:36},()=>({x:Math.random()*W,y:Math.random()*H,s:1+Math.random()*1.6,v:14+Math.random()*22})); }
initSnow();

function render(){
  const t=gt;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0e1626'); g.addColorStop(1,'#15233a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(GROUND.complete && GROUND.naturalWidth){
    ctx.globalAlpha=0.9;
    ctx.drawImage(GROUND, offX, offY, CS*COLS, CS*ROWS);
    ctx.globalAlpha=1;
  }
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
    const x=offX+c*CS, y=offY+r*CS;
    if(pathSet.has(c+','+r)){
      ctx.fillStyle='rgba(80,105,150,.45)'; ctx.fillRect(x,y,CS,CS);
      const sr=srand(c*7,r*13);
      if(sr<0.4){
        ctx.fillStyle='#3d5378';
        ctx.beginPath(); ctx.arc(x+CS*(0.2+sr), y+CS*(0.3+sr*0.8), CS*0.045,0,7); ctx.fill();
      }
    } else {
      ctx.strokeStyle='rgba(80,105,150,.14)'; ctx.lineWidth=1;
      ctx.strokeRect(x+1,y+1,CS-2,CS-2);
    }
  }
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
    if(pathSet.has(c+','+r)) continue;
    if(towers.some(tw=>tw.c===c&&tw.r===r)) continue;
    const sr=srand(c*31,r*17);
    if(sr<0.12) drawTree(offX+(c+0.5)*CS, offY+(r+0.55)*CS, sr/0.12);
  }

  {
    const gy=offY+10.5*CS, gx=offX+COLS*CS-CS*0.25;
    // вода Байкала — полукруг у правого края
    ctx.fillStyle='#2f7ec4';
    ctx.beginPath(); ctx.ellipse(gx+CS*0.35,gy,CS*1.15,CS*0.85,0,0,7); ctx.fill();
    ctx.strokeStyle='#7fd8ff'; ctx.lineWidth=2;
    for(let w=0;w<3;w++){
      ctx.beginPath();
      const wy=gy-CS*0.3+w*CS*0.3, amp=CS*0.05;
      for(let px=-CS*0.7;px<=CS*0.5;px+=4){
        const yy=wy+Math.sin(px/8+t*3+w*2)*amp;
        px===-CS*0.7?ctx.moveTo(gx+px,yy):ctx.lineTo(gx+px,yy);
      }
      ctx.stroke();
    }
    // нерпа на льдине покачивается (рисуется ПОСЛЕ башен, чтобы её не закрывали)
    if(NERPA.complete && NERPA.naturalWidth){
      const bobN=Math.sin(t*1.8)*CS*0.04;
      const nsz=CS*1.35;
      NERPAP={x:gx-nsz*0.62, y:gy-nsz*0.78+bobN, s:nsz};
    }
  }

  // подсветки
  const showFree = selCard || (drag&&drag.moved);
  if(showFree){
    ctx.fillStyle='rgba(255,210,60,.07)';
    for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
      if(!canPlace(c,r)) continue;
      ctx.fillRect(offX+c*CS+1,offY+r*CS+1,CS-2,CS-2);
    }
  }
  if(badCell){
    ctx.fillStyle='rgba(255,80,80,'+(badCell.t/0.3*0.4)+')';
    ctx.fillRect(offX+badCell.c*CS,offY+badCell.r*CS,CS,CS);
  }
  // обучение: клетка-мишень со стрелкой
  if(tut===1 && tutCell && state==='play'){
    const tx=offX+tutCell[0]*CS, ty=offY+tutCell[1]*CS;
    const pk=0.45+0.3*Math.sin(t*4);
    ctx.save();
    ctx.fillStyle='rgba(255,210,60,'+(pk*0.35)+')';
    ctx.fillRect(tx,ty,CS,CS);
    ctx.strokeStyle='rgba(255,210,60,'+pk+')'; ctx.lineWidth=3;
    ctx.setLineDash([7,5]); ctx.strokeRect(tx+2,ty+2,CS-4,CS-4); ctx.setLineDash([]);
    const bob=Math.abs(Math.sin(t*4.5))*8;
    const ax=tx+CS/2, ay=ty-CS*0.35-bob;
    ctx.fillStyle='#ffd23c'; ctx.strokeStyle=OUT; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ax,ay+12); ctx.lineTo(ax+9,ay); ctx.lineTo(ax+3,ay); ctx.lineTo(ax+3,ay-12); ctx.lineTo(ax-3,ay-12); ctx.lineTo(ax-3,ay); ctx.lineTo(ax-9,ay); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.font='bold '+Math.round(CS*0.26)+'px RussoOne,sans-serif'; ctx.textAlign='center';
    ctx.strokeStyle=OUT; ctx.lineWidth=3;
    ctx.strokeText(STR.tutTarget, ax, ay-18);
    ctx.fillStyle='#ffd23c'; ctx.fillText(STR.tutTarget, ax, ay-18);
    ctx.restore();
  }
  if(selTw){
    const b=TOWERS[selTw.type];
    const rng=(b.rng+0.18*(selTw.lvl-1))*CS;
    ctx.fillStyle='rgba(127,216,255,.1)'; ctx.strokeStyle='rgba(127,216,255,.4)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(offX+(selTw.c+0.5)*CS, offY+(selTw.r+0.5)*CS, rng,0,7);
    ctx.fill(); ctx.stroke();
  }

  corpses.forEach(cp=>{
    const a=cp.t/cp.max;
    ctx.save(); ctx.globalAlpha=a;
    ctx.translate(cp.x,cp.y); ctx.rotate((1-a)*1.6); ctx.scale(a*0.8+0.2,a*0.8+0.2); ctx.translate(-cp.x,-cp.y);
    drawBot(cp.x,cp.y,cp.a,0,ENEMIES[cp.type],ENEMIES[cp.type].sz,false,cp.type,0);
    ctx.restore();
  });

  towers.slice().sort((a,b)=>a.r-b.r||a.c-b.c).forEach(tw=>drawTowerFig(tw,t));
  if(NERPAP) ctx.drawImage(NERPA, NERPAP.x, NERPAP.y, NERPAP.s, NERPAP.s);

  // пульсирующий ▲ над башней, если хватает на апгрейд
  if(state==='play'){
    const pk=0.65+0.35*Math.sin(t*4.5);
    towers.forEach(tw=>{
      if(tw.lvl>=3||money<upgradeCost(tw)||tw.born>0) return;
      const x=offX+(tw.c+0.5)*CS, y=offY+(tw.r+0.5)*CS-CS*0.78-Math.sin(t*4.5)*2;
      ctx.save(); ctx.globalAlpha=pk;
      ctx.fillStyle='#6fe08a'; ctx.strokeStyle=OUT; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x+6,y+4); ctx.lineTo(x-6,y+4); ctx.closePath();
      ctx.fill(); ctx.stroke(); ctx.restore();
    });
  }

  enemies.forEach(e=>{
    const [x,y,a]=posAt(e.d), b=ENEMIES[e.type];
    const esz=b.sz*(e.mega?1.4:1);
    drawBot(x,y,a,e.d/CS+e.ph,b,esz,e.slow>0||e.frz>0,e.type,e.flash);
    const w=CS*esz*1.7;
    ctx.fillStyle='#0a0e18';
    ctx.beginPath(); ctx.roundRect(x-w/2,y-CS*esz-13,w,5,2.5); ctx.fill();
    ctx.fillStyle=e.hp/e.maxhp>0.4?'#6fe08a':'#ff6a6a';
    ctx.beginPath(); ctx.roundRect(x-w/2,y-CS*esz-13,w*Math.max(0,e.hp/e.maxhp),5,2.5); ctx.fill();
  });

  // HP-бар финального босса
  (function(){
    const mb=enemies.find(e=>e.mega);
    if(!mb) return;
    const bw=Math.min(W-40,420), bx=(W-bw)/2, by=64;
    ctx.fillStyle='rgba(10,14,24,.85)';
    ctx.beginPath(); ctx.roundRect(bx-4,by-4,bw+8,22,8); ctx.fill();
    ctx.fillStyle='#3a1522';
    ctx.beginPath(); ctx.roundRect(bx,by,bw,14,6); ctx.fill();
    const fr=Math.max(0,mb.hp/mb.maxhp);
    const g=ctx.createLinearGradient(bx,0,bx+bw,0);
    g.addColorStop(0,'#ff4d7d'); g.addColorStop(1,'#d05070');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*fr,14,6); ctx.fill();
    ctx.fillStyle='#ffd7e4'; ctx.font='800 11px RussoOne, sans-serif'; ctx.textAlign='center';
    ctx.fillText(STR.bossName, W/2, by-8);
  })();

  projs.forEach(p=>{
    if(p.type==='archer'){
      const ang=Math.atan2(p.vy||0,p.vx||1);
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ang);
      ctx.strokeStyle=OUT; ctx.lineWidth=3.5;
      ctx.beginPath(); ctx.moveTo(-CS*0.15,0); ctx.lineTo(CS*0.12,0); ctx.stroke();
      ctx.strokeStyle='#c8a060'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-CS*0.14,0); ctx.lineTo(CS*0.1,0); ctx.stroke();
      ctx.fillStyle='#e8f0ff';
      ctx.beginPath(); ctx.moveTo(CS*0.17,0); ctx.lineTo(CS*0.06,-CS*0.04); ctx.lineTo(CS*0.06,CS*0.04); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if(p.type==='frost'){
      ctx.fillStyle='#7fd8ff'; ctx.strokeStyle=OUT; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(p.x,p.y,CS*0.1,0,7); ctx.fill(); ctx.stroke();
    } else {
      const fl=0.8+0.2*Math.sin(gt*20);
      ctx.fillStyle='#ff7a3c'; ctx.strokeStyle=OUT; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(p.x,p.y,CS*0.12*fl,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#ffd23c';
      ctx.beginPath(); ctx.arc(p.x,p.y,CS*0.06,0,7); ctx.fill();
    }
  });

  parts.forEach(q=>{
    ctx.globalAlpha=Math.max(0,q.t/q.max);
    if(q.ring){
      ctx.strokeStyle=q.col; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(q.x,q.y,q.r*(1-q.t/q.max+0.2),0,7); ctx.stroke();
    } else {
      ctx.fillStyle=q.col;
      ctx.beginPath(); ctx.arc(q.x,q.y,q.r||3,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
  });

  ctx.textAlign='center'; ctx.font='bold '+Math.round(CS*0.28)+'px sans-serif';
  dmgTxt.forEach(q=>{
    ctx.globalAlpha=Math.min(1,q.t/q.max*1.6);
    ctx.strokeStyle=OUT; ctx.lineWidth=3;
    ctx.strokeText(q.str,q.x,q.y);
    ctx.fillStyle=q.col;
    ctx.fillText(q.str,q.x,q.y);
    ctx.globalAlpha=1;
  });

  // рать на поле
  militia.forEach(m=>{
    const [mx,my,ma]=posAt(m.d);
    const sz=CS*0.34, fight=!!m.tgt;
    const bimg=BEASTIMG[m.beast||0];
    const spr=(bimg&&bimg.complete&&bimg.naturalWidth)?bimg:MILIMG;
    if(spr.complete && spr.naturalWidth){
      const ms=CS*0.85;
      const bob=Math.abs(Math.sin(m.swing*0.6))*3;
      const tilt=fight?Math.sin(m.swing)*0.16:0;
      let mflp=1;
      if(fight&&m.tgt){ const tp=posAt(m.tgt.d); mflp=tp[0]<mx?-1:1; }
      ctx.save(); ctx.translate(mx,my-bob);
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.beginPath(); ctx.ellipse(0,ms*0.32+bob,ms*0.3,ms*0.1,0,0,7); ctx.fill();
      ctx.fillStyle='#1a2438'; ctx.fillRect(-ms*0.3,-ms*0.82,ms*0.6,4);
      ctx.fillStyle='#e8b45a'; ctx.fillRect(-ms*0.3,-ms*0.82,ms*0.6*Math.max(0,m.hp/m.maxhp),4);
      ctx.scale(mflp,1); ctx.rotate(tilt);
      ctx.drawImage(spr,-ms/2,-ms*0.68,ms,ms);
      ctx.restore();
      return;
    }
    ctx.save(); ctx.translate(mx,my);
    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.beginPath(); ctx.ellipse(0,sz*0.85,sz*0.7,sz*0.24,0,0,7); ctx.fill();
    // тело — дэгэл
    ctx.fillStyle='#b06a34'; ctx.strokeStyle=OUT; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0,sz*0.25,sz*0.55,sz*0.7,0,0,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#e8b45a';
    ctx.fillRect(-sz*0.12,-sz*0.2,sz*0.24,sz*0.85);
    // голова + меховая шапка
    ctx.fillStyle='#e8b48c';
    ctx.beginPath(); ctx.arc(0,-sz*0.55,sz*0.42,0,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#5a4632';
    ctx.beginPath(); ctx.arc(0,-sz*0.72,sz*0.44,Math.PI,0); ctx.fill(); ctx.stroke();
    // меч: замах в бою, у ноги в походе
    const sw=fight?Math.sin(m.swing)*0.9:0.5;
    ctx.save(); ctx.translate(sz*0.5,-sz*0.1); ctx.rotate(-0.6+sw);
    ctx.strokeStyle='#d8e0ea'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(sz*0.85,-sz*0.4); ctx.stroke();
    ctx.restore();
    // hp
    ctx.fillStyle='#1a2438'; ctx.fillRect(-sz*0.6,-sz*1.35,sz*1.2,4);
    ctx.fillStyle='#e8b45a'; ctx.fillRect(-sz*0.6,-sz*1.35,sz*1.2*Math.max(0,m.hp/m.maxhp),4);
    ctx.restore();
  });

  // подарочная стрелка «Усиль!» над башней
  if(giftArrow && state==='play'){
    const cand=towers.filter(tw=>tw.lvl<3).sort((a,b)=>upgradeCost(a)-upgradeCost(b))[0];
    if(cand){
      const gx=offX+(cand.c+0.5)*CS, gy=offY+(cand.r+0.5)*CS-CS*0.95-Math.abs(Math.sin(t*4.5))*10;
      ctx.save();
      ctx.fillStyle='#ffd23c'; ctx.strokeStyle=OUT; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(gx,gy+16); ctx.lineTo(gx+12,gy); ctx.lineTo(gx+4,gy); ctx.lineTo(gx+4,gy-16); ctx.lineTo(gx-4,gy-16); ctx.lineTo(gx-4,gy); ctx.lineTo(gx-12,gy); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.font='bold '+Math.round(CS*0.3)+'px RussoOne,sans-serif'; ctx.textAlign='center';
      ctx.strokeText(STR.giftA,gx,gy-24); ctx.fillStyle='#ffd23c'; ctx.fillText(STR.giftA,gx,gy-24);
      ctx.restore();
    }
  }

  drawFxs(t);

  // призрак башни при перетаскивании
  if(drag && drag.moved){
    const cell=cellAt(drag.x,drag.y-CS*1.1);
    if(cell){
      const [c,r]=cell;
      const gx=offX+(c+0.5)*CS, gy=offY+(r+0.5)*CS;
      const ok=canPlace(c,r);
      const b=TOWERS[drag.type];
      // радиус
      ctx.fillStyle=ok?'rgba(120,220,140,.12)':'rgba(255,90,90,.12)';
      ctx.strokeStyle=ok?'rgba(120,220,140,.55)':'rgba(255,90,90,.55)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(gx,gy,b.rng*CS,0,7); ctx.fill(); ctx.stroke();
      // клетка
      ctx.fillStyle=ok?'rgba(120,220,140,.3)':'rgba(255,90,90,.3)';
      ctx.fillRect(offX+c*CS,offY+r*CS,CS,CS);
      // призрак
      drawTowerAt(gx,gy,drag.type,1,gt,0,0,-Math.PI/2,0.65);
    }
  }

  ctx.fillStyle='rgba(235,242,255,.8)';
  snowAmb.forEach(s=>{
    s.y+=s.v/60; s.x+=Math.sin(t+s.s)*0.3;
    if(s.y>H){ s.y=-4; s.x=Math.random()*W; }
    ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,7); ctx.fill();
  });
}

// ================= ЦИКЛ =================
const STEP=1000/60;
let acc=0, last=performance.now(), paused=false, frames=0, fpsAt=last;
addEventListener('blur',()=>paused=true);
addEventListener('focus',()=>{ paused=false; last=performance.now(); });
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ paused=true; try{ if(ac) ac.suspend(); }catch(e){} }
  else { paused=false; last=performance.now(); if(ac && ac.state!=='running'){ try{ ac.resume(); }catch(e){} } }
});
const dev=new URLSearchParams(location.search).has('dev');
if(dev) $('dev').style.display='block';

function frame(now){
  requestAnimationFrame(frame);
  if(paused) return;
  fpsTick(now-last);
  acc+=now-last; last=now;
  if(acc>250) acc=250;
  while(acc>=STEP){ update(STEP); acc-=STEP; }
  if(shakeA>0.3){
    cv.style.transform='translate('+((Math.random()-.5)*2*shakeA).toFixed(1)+'px,'+((Math.random()-.5)*2*shakeA).toFixed(1)+'px)';
    shakeA*=0.86;
  } else if(shakeA>0){ shakeA=0; cv.style.transform=''; }
  render();
  if(dev){ frames++; if(now-fpsAt>=500){ $('dev').textContent=Math.round(frames*1000/(now-fpsAt))+' fps | e:'+enemies.length; frames=0; fpsAt=now; } }
}
reset();
requestAnimationFrame(frame);


</script>
